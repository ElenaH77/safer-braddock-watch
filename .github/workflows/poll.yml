name: poll

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
    inputs:
      test_alert:
        description: 'Send a test Pushover alert (verifies wiring without polling)'
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: poll
  cancel-in-progress: false

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Poll
        env:
          PUSHOVER_USER: ${{ secrets.PUSHOVER_USER }}
          PUSHOVER_TOKEN: ${{ secrets.PUSHOVER_TOKEN }}
          TEST_ALERT: ${{ inputs.test_alert }}
        run: python scripts/poll.py

      - name: Commit state
        if: always()
        run: |
          git config user.email "actions@github.com"
          git config user.name "github-actions[bot]"
          git add state/last_seen.json || true
          if ! git diff --staged --quiet; then
            git commit -m "state: $(date -u +%FT%TZ)"
            git push
          fi
